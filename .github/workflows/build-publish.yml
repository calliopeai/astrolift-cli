name: Build and Publish

# astrolift-cli release pipeline.
#   - Tag v*       -> goreleaser builds binaries (Linux/macOS/Win, amd64/arm64),
#                     Homebrew tap, Scoop bucket, and Docker images on
#                     docker.io/calliopeai/astrolift-cli + ghcr.io/calliopeai/astrolift-cli
#                     (multi-arch manifest, :version + :latest).
#   - main push    -> from-source multi-arch image tagged
#                     :latest + :main-{sha} on both registries.
#   - dispatch     -> manual run.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY_DOCKERHUB: docker.io
  REGISTRY_GHCR: ghcr.io
  IMAGE: calliopeai/astrolift-cli

jobs:
  release:
    name: GoReleaser (tagged release)
    if: ${{ github.ref_type == 'tag' && startsWith(github.ref_name, 'v') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_DOCKERHUB }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Allow brews/scoops to push to the calliopeai homebrew-tap
          # and scoop-bucket repos. Set this org secret to a PAT with
          # contents:write on those repos.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.TAP_PUBLISH_TOKEN }}
          SCOOP_TAP_GITHUB_TOKEN: ${{ secrets.TAP_PUBLISH_TOKEN }}

  release-smoke:
    name: Release smoke (${{ matrix.os_label }})
    # Runs the exact curl one-liner the downloads page advertises,
    # against the release we just cut. Catches asset-naming and
    # checksum-publishing regressions before any user does.
    needs: release
    if: ${{ github.ref_type == 'tag' && startsWith(github.ref_name, 'v') }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os_label: linux-amd64
            asset: astro-linux-amd64.tar.gz
            sha_cmd: sha256sum
          - runner: macos-14
            os_label: darwin-arm64
            asset: astro-darwin-arm64.tar.gz
            sha_cmd: shasum -a 256
    steps:
      - name: Wait for release assets to be visible
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          ASSET: ${{ matrix.asset }}
        run: |
          set -euo pipefail
          # goreleaser-action uploads synchronously, but the GitHub
          # release API can lag by a few seconds. Poll up to 60s.
          for i in $(seq 1 30); do
            if gh release view "$TAG" \
                 --repo "${{ github.repository }}" \
                 --json assets \
                 --jq '.assets[].name' | grep -qx "$ASSET"; then
              echo "asset $ASSET visible after ${i}x2s"
              exit 0
            fi
            sleep 2
          done
          echo "asset $ASSET not visible after 60s" >&2
          gh release view "$TAG" --repo "${{ github.repository }}" --json assets >&2 || true
          exit 1

      - name: Download, extract, and run astro
        env:
          TAG: ${{ github.ref_name }}
          ASSET: ${{ matrix.asset }}
        run: |
          set -Eeuo pipefail
          # Surface the failing command + line on any error.
          trap 'rc=$?; echo "::error::smoke step failed at line $LINENO with exit code $rc (cmd: $BASH_COMMAND)" >&2; ls -la; exit $rc' ERR
          # Extract into a dedicated tmpdir so we never collide with
          # the runner workspace or with the downloaded tarball.
          WORK="$(mktemp -d)"
          cd "$WORK"
          URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${ASSET}"
          echo "Fetching $URL into $WORK"
          # Download to a file first so curl errors print stderr +
          # HTTP code, and tar failures aren't conflated with curl
          # failures via pipefail. --retry rides out the brief window
          # where the release API has the asset but the SAS URL on
          # release-assets.githubusercontent.com is still propagating.
          curl -fSL --retry 5 --retry-delay 3 --retry-all-errors \
               -o "$ASSET" \
               -w "http_code=%{http_code} size=%{size_download} url_effective=%{url_effective}\n" \
               "$URL"
          ls -la "$ASSET"
          file "$ASSET" || true
          tar -xzvf "$ASSET"
          ls -la
          test -x ./astro || { echo "astro binary missing or non-executable" >&2; ls -la; exit 1; }
          OUT="$(./astro --version)"
          echo "astro --version: $OUT"
          # The tag is `vX.Y.Z`; the binary may print `X.Y.Z` or
          # `vX.Y.Z`. Accept either as long as the numeric core
          # appears in the output.
          NUMERIC="${TAG#v}"
          if ! printf '%s\n' "$OUT" | grep -qF "$NUMERIC"; then
            echo "version mismatch: output does not contain $NUMERIC" >&2
            exit 1
          fi

      - name: Verify SHA-256 against astro-checksums.txt
        env:
          TAG: ${{ github.ref_name }}
          ASSET: ${{ matrix.asset }}
          SHA_CMD: ${{ matrix.sha_cmd }}
        run: |
          set -Eeuo pipefail
          trap 'rc=$?; echo "::error::sha verify failed at line $LINENO with exit code $rc (cmd: $BASH_COMMAND)" >&2; exit $rc' ERR
          CHK_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/astro-checksums.txt"
          ASSET_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${ASSET}"
          curl -fSL --retry 5 --retry-delay 3 --retry-all-errors -o astro-checksums.txt "$CHK_URL"
          curl -fSL --retry 5 --retry-delay 3 --retry-all-errors -o "$ASSET" "$ASSET_URL"
          EXPECTED="$(grep -E "  ${ASSET}\$" astro-checksums.txt | awk '{print $1}')"
          if [ -z "$EXPECTED" ]; then
            echo "no checksum line for $ASSET in astro-checksums.txt" >&2
            cat astro-checksums.txt >&2
            exit 1
          fi
          ACTUAL="$($SHA_CMD "$ASSET" | awk '{print $1}')"
          echo "expected: $EXPECTED"
          echo "actual:   $ACTUAL"
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "checksum mismatch for $ASSET" >&2
            exit 1
          fi

  main-image:
    name: Main image (${{ matrix.suffix }})
    if: ${{ github.ref_type != 'tag' }}
    # Native arm64 runner avoids QEMU emulation overhead.
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
        include:
          - platform: linux/amd64
            suffix: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            suffix: arm64
            runner: ubuntu-24.04-arm

    outputs:
      sha_tag: ${{ steps.tag.outputs.sha_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute tag
        id: tag
        run: |
          set -euo pipefail
          echo "sha_tag=main-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_DOCKERHUB }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.source
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE }}:${{ steps.tag.outputs.sha_tag }}-${{ matrix.suffix }}
          build-args: |
            VERSION=${{ steps.tag.outputs.sha_tag }}
          cache-from: type=gha,scope=cli-${{ matrix.suffix }}
          cache-to:   type=gha,mode=max,scope=cli-${{ matrix.suffix }}
          provenance: false
          sbom: false

      - name: Mirror to Docker Hub
        run: |
          set -euo pipefail
          GHCR_TAG="${{ env.REGISTRY_GHCR }}/${{ env.IMAGE }}:${{ steps.tag.outputs.sha_tag }}-${{ matrix.suffix }}"
          HUB_TAG="${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE }}:${{ steps.tag.outputs.sha_tag }}-${{ matrix.suffix }}"
          docker pull --platform ${{ matrix.platform }} "$GHCR_TAG"
          docker tag "$GHCR_TAG" "$HUB_TAG"
          docker push "$HUB_TAG"

  main-manifest:
    name: Main multi-arch manifest
    needs: main-image
    if: ${{ github.ref_type != 'tag' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_DOCKERHUB }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push manifests
        run: |
          set -euo pipefail
          BASE_TAG="${{ needs.main-image.outputs.sha_tag }}"
          for REGISTRY in "${{ env.REGISTRY_DOCKERHUB }}" "${{ env.REGISTRY_GHCR }}"; do
            BASE="${REGISTRY}/${{ env.IMAGE }}"
            for ALIAS in "${BASE_TAG}" "latest" "main"; do
              docker manifest create --amend "${BASE}:${ALIAS}" \
                "${BASE}:${BASE_TAG}-amd64" \
                "${BASE}:${BASE_TAG}-arm64"
              docker manifest push "${BASE}:${ALIAS}"
            done
          done
